<!DOCTYPE html>
<html>
<head>
    <title>AI Training Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        #terminal { background: #000; border: 1px solid #00ff41; height: 350px; overflow-y: auto; padding: 15px; box-shadow: 0 0 15px #00ff41; }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <h4>> СИСТЕМА ОБУЧЕНИЯ АГЕНТА: <span id="title"></span></h4>
    <div id="terminal"></div>
    <div class="mt-3 text-center">
        <div id="status" class="badge bg-success">ПРОЦЕСС ИДЕТ</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const eps = params.get('episodes');
        document.getElementById('title').innerText = type.toUpperCase();
        const terminal = document.getElementById('terminal');

        const eventSource = new EventSource(`/train_process?type=${type}&episodes=${eps}`);

        eventSource.onmessage = function(event) {
            if (event.data.includes("[DONE]")) {
                terminal.innerHTML += "<br> [SYSTEM] Окно закроется через 3 секунды...";
                document.getElementById('status').innerText = "ЗАВЕРШЕНО";
                eventSource.close();
                setTimeout(() => window.close(), 3000);
            } else {
                terminal.innerHTML += event.data + "<br>";
                terminal.scrollTop = terminal.scrollHeight;
            }
        };

        eventSource.onerror = function() {
            terminal.innerHTML += "<br>[ERROR] Ошибка связи с сервером.";
            eventSource.close();
        };
    </script>
</body>
</html>
